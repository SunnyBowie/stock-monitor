<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Monitor v2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">A 股实时盯盘 · EastMoney Live</div>
        <h1>Stock Monitor</h1>
      </div>
      <div class="top-actions">
        <input id="searchInput" placeholder="搜索代码 / 名称">
        <button id="searchBtn">搜索全市场</button>
        <button id="refreshBtn">刷新自选</button>
      </div>
    </header>

    <section class="status" id="status">准备加载真实行情</section>

    <main class="layout">
      <aside class="panel watch-panel">
        <div class="panel-head">
          <h2>自选股</h2>
          <span id="watchCount">0</span>
        </div>
        <div class="add-row">
          <input id="codeInput" placeholder="600519">
          <input id="nameInput" placeholder="贵州茅台">
          <button id="addBtn">添加</button>
        </div>
        <div id="watchlist" class="watchlist"></div>
      </aside>

      <section class="panel main-panel">
        <div class="detail-head">
          <div>
            <h2 id="stockTitle">请选择股票</h2>
            <span id="stockMeta">真实行情 / 模拟兜底</span>
          </div>
          <button id="deleteBtn">删除自选</button>
        </div>
        <div class="metrics">
          <div><label>现价</label><strong id="mPrice">--</strong></div>
          <div><label>涨跌幅</label><strong id="mPct">--</strong></div>
          <div><label>涨跌额</label><strong id="mChange">--</strong></div>
          <div><label>今开</label><strong id="mOpen">--</strong></div>
          <div><label>最高</label><strong id="mHigh">--</strong></div>
          <div><label>最低</label><strong id="mLow">--</strong></div>
          <div><label>成交量</label><strong id="mVolume">--</strong></div>
          <div><label>成交额</label><strong id="mAmount">--</strong></div>
        </div>
        <div class="tabs">
          <button class="active" data-tab="minute">分时趋势</button>
          <button data-tab="daily">日 K 趋势</button>
        </div>
        <canvas id="chart" width="960" height="280"></canvas>
      </section>

      <aside class="panel alert-panel">
        <div class="panel-head">
          <h2>价格提醒</h2>
        </div>
        <select id="alertType">
          <option value="above_percent">涨超百分比</option>
          <option value="below_percent">跌超百分比</option>
          <option value="above_price">涨过指定价</option>
          <option value="below_price">跌破指定价</option>
        </select>
        <input id="thresholdInput" value="3" placeholder="阈值">
        <button id="saveAlertBtn">保存提醒</button>
        <div id="alerts" class="alerts"></div>
      </aside>
    </main>

    <section class="panel market-panel">
      <div class="panel-head">
        <h2>A 股市场列表</h2>
        <span>可搜索并添加任意 A 股</span>
      </div>
      <div class="market-table-wrap">
        <table>
          <thead>
            <tr><th>代码</th><th>名称</th><th>现价</th><th>涨跌幅</th><th>涨跌额</th><th>成交额</th><th>操作</th></tr>
          </thead>
          <tbody id="marketBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
