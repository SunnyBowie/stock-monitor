<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Monitor Minimal Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101112;
      --surface: #17191b;
      --surface-2: #202326;
      --surface-3: #272b2f;
      --ink: #f1f3f4;
      --muted: #989fa6;
      --quiet: #656d75;
      --line: #2b3035;
      --up: #ff6b66;
      --down: #35c58a;
      --blue: #68a7ff;
      --amber: #ffc464;
      --radius: 8px;
      --shadow: 0 18px 54px rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 74px minmax(340px, 470px) minmax(520px, 1fr);
      background:
        linear-gradient(90deg, #0d0e0f 0, #0d0e0f 74px, transparent 74px),
        var(--bg);
    }

    .rail {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      border-right: 1px solid #1f2327;
    }

    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #f1f3f4;
      color: #101112;
      font-weight: 800;
      font-size: 15px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav button,
    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--muted);
      position: relative;
    }

    .nav button.active {
      background: var(--surface-2);
      color: var(--ink);
    }

    .nav button:hover,
    .icon-button:hover {
      background: var(--surface-2);
      color: var(--ink);
    }

    .nav button svg,
    .icon-button svg,
    .search-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      padding: 6px 8px;
      border-radius: 6px;
      background: #eef2f5;
      color: #101112;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .24);
      z-index: 10;
    }

    [data-tip]:hover::after {
      opacity: 1;
    }

    .switch {
      width: 38px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      padding: 2px;
      display: flex;
      justify-content: flex-end;
    }

    .switch span {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--blue);
    }

    .panel {
      border-right: 1px solid var(--line);
      min-height: 100vh;
      padding: 24px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block {
      display: grid;
      gap: 5px;
    }

    .eyebrow {
      color: var(--quiet);
      font-size: 12px;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 750;
    }

    h2 {
      font-size: 22px;
      font-weight: 720;
    }

    h3 {
      font-size: 15px;
      font-weight: 650;
    }

    .mini-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      padding: 0 42px;
      outline: none;
    }

    .search input:focus {
      border-color: #3a4148;
      background: var(--surface-2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--quiet);
      display: grid;
      place-items: center;
    }

    .watchlist {
      display: grid;
      gap: 8px;
      overflow: auto;
      padding-right: 4px;
    }

    .stock-row {
      min-height: 74px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 13px 14px;
      text-align: left;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
      touch-action: pan-y;
    }

    .stock-row:hover {
      background: rgba(255, 255, 255, .035);
    }

    .stock-row.active {
      background: var(--surface);
      border-color: var(--line);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .stock-row.pinned .stock-name::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      display: inline-block;
      margin-left: 8px;
      vertical-align: 2px;
    }

    .stock-id {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .stock-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 650;
    }

    .stock-code,
    .fineprint,
    .meta,
    .metric span,
    .caption {
      color: var(--muted);
      font-size: 12px;
    }

    .quote {
      display: grid;
      gap: 7px;
      justify-items: end;
      min-width: 86px;
    }

    .quote strong {
      font-size: 18px;
      font-weight: 720;
      font-variant-numeric: tabular-nums;
    }

    .pct {
      min-width: 62px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .minimal .pct {
      background: transparent;
      justify-content: end;
      place-items: end;
    }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .flat { color: var(--muted); }
    .pct.up { background: rgba(255, 107, 102, .12); }
    .pct.down { background: rgba(53, 197, 138, .12); }
    .minimal .pct.up,
    .minimal .pct.down {
      background: transparent;
    }

    .content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 24px clamp(24px, 4vw, 48px) 30px;
      gap: 22px;
    }

    .workspace.discovery-mode .detail-view,
    .workspace.discovery-mode .hero-strip {
      display: none;
    }

    .workspace.discovery-mode .discovery-view {
      display: grid;
    }

    .hero-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 18px;
      min-height: 92px;
    }

    .hero-price {
      display: grid;
      gap: 8px;
    }

    .hero-price h2 {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-price .price {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 780;
      line-height: .95;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .change-line {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .pulse {
      animation: pulse .72s ease;
    }

    @keyframes pulse {
      0% { opacity: .54; }
      100% { opacity: 1; }
    }

    .segmented {
      min-height: 40px;
      padding: 3px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .segmented button {
      height: 32px;
      padding: 0 13px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .segmented button.active {
      color: var(--ink);
      background: var(--surface-3);
    }

    .detail-view {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(280px, .58fr);
      gap: 18px;
      align-items: start;
    }

    .chart-area,
    .side-stack,
    .discovery-view {
      min-width: 0;
    }

    .chart-shell {
      min-height: 384px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .chart-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    canvas {
      display: block;
      width: 100%;
      height: 310px;
      border-radius: 6px;
      background: #131517;
    }

    .drawer {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .018);
      overflow: hidden;
    }

    summary {
      min-height: 48px;
      list-style: none;
      cursor: pointer;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 620;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "+";
      color: var(--muted);
      font-size: 18px;
      font-weight: 400;
    }

    details[open] summary::after {
      content: "-";
    }

    .drawer-body {
      padding: 0 14px 14px;
    }

    .indicators {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
    }

    .chip.active {
      color: var(--ink);
      background: rgba(104, 167, 255, .18);
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .quiet-card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 16px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-height: 66px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .025);
      padding: 12px;
      display: grid;
      gap: 7px;
      align-content: center;
    }

    .metric strong {
      font-size: 17px;
      font-variant-numeric: tabular-nums;
    }

    .orderbook {
      display: grid;
      gap: 9px;
    }

    .book-row {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .bar {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-3);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
    }

    .bar.sell span { background: rgba(255, 107, 102, .5); }
    .bar.buy span { background: rgba(53, 197, 138, .5); }

    .finance {
      display: grid;
      gap: 14px;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      display: inline-block;
    }

    .legend .rev-dot { background: rgba(104, 167, 255, .72); }
    .legend .profit-dot { background: rgba(255, 196, 100, .78); }

    .finance-tabs {
      min-height: 34px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .018);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .finance-tabs button {
      height: 26px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .finance-tabs button.active {
      background: var(--surface-3);
      color: var(--ink);
    }

    .bars {
      height: 130px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: end;
      gap: 14px;
      padding-top: 8px;
    }

    .bar-pair {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      align-items: end;
    }

    .bar-pair i {
      display: block;
      border-radius: 4px 4px 0 0;
      min-height: 16px;
    }

    .bar-pair .rev { background: rgba(104, 167, 255, .72); }
    .bar-pair .profit { background: rgba(255, 196, 100, .78); }

    .pe-track {
      height: 9px;
      border-radius: 999px;
      background: var(--surface-3);
      position: relative;
      margin: 10px 0 4px;
    }

    .pe-track span {
      position: absolute;
      left: 15%;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 5px rgba(255, 196, 100, .12);
    }

    .statement-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .statement-item {
      min-height: 52px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .025);
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .statement-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .statement-item strong {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .report-list {
      display: grid;
      gap: 8px;
    }

    .report-row {
      min-height: 34px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, .045);
      color: var(--muted);
      font-size: 13px;
    }

    .report-row:last-child {
      border-bottom: 0;
    }

    .report-row strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .report-note {
      color: var(--quiet);
      font-size: 12px;
      line-height: 1.5;
    }

    .news-list {
      display: grid;
      gap: 10px;
    }

    .news-item {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .discovery-view {
      display: none;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .index-card {
      min-height: 112px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 16px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .index-card strong {
      font-size: 24px;
      font-variant-numeric: tabular-nums;
    }

    .result-list {
      border-top: 1px solid var(--line);
      display: grid;
    }

    .result {
      min-height: 60px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }

    .result button {
      height: 34px;
      padding: 0 13px;
      border-radius: 7px;
      background: var(--surface-2);
      color: var(--ink);
    }

    .empty {
      padding: 28px 0;
      color: var(--quiet);
      font-size: 14px;
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 64px minmax(300px, 390px) minmax(0, 1fr);
      }

      .detail-view {
        grid-template-columns: 1fr;
      }

      .side-stack {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .quiet-card:nth-child(1) {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
        background: var(--bg);
      }

      .rail {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        z-index: 20;
        height: 64px;
        padding: 8px 16px;
        flex-direction: row;
        background: rgba(13, 14, 15, .94);
        backdrop-filter: blur(18px);
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      .nav {
        display: flex;
      }

      .nav button,
      .icon-button {
        width: 42px;
        height: 42px;
      }

      [data-tip]::after {
        display: none;
      }

      .panel {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 22px 18px 18px;
      }

      .watchlist {
        grid-template-columns: 1fr;
        max-height: 42vh;
      }

      .workspace {
        min-height: auto;
        padding: 18px 18px 86px;
      }

      .hero-strip {
        grid-template-columns: 1fr;
      }

      .hero-price .price {
        font-size: 44px;
      }

      .side-stack,
      .index-grid {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 260px;
      }
    }
  </style>
</head>
<body class="minimal">
  <div class="app">
    <nav class="rail" aria-label="主导航">
      <div class="mark">SM</div>
      <div class="nav">
        <button class="active" id="watchTab" data-tip="自选">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
        </button>
        <button id="discoverTab" data-tip="发现">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="7"/></svg>
        </button>
      </div>
      <button class="icon-button" id="minimalToggle" data-tip="极简模式">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0 0 12 6 6 0 0 1 0-12Z"/><path d="M12 15a6 6 0 0 0 0 6 9 9 0 0 0 0-18 6 6 0 0 1 0 12Z"/></svg>
      </button>
    </nav>

    <aside class="panel">
      <header class="topbar">
        <div class="title-block">
          <div class="eyebrow" id="marketState">A 股 · 真实接口待接入</div>
          <h1>自选</h1>
        </div>
        <div class="mini-actions">
          <button class="icon-button" id="refreshBtn" data-tip="刷新">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.3L3 16"/><path d="M3 21v-5h5"/><path d="M3 12A9 9 0 0 1 18.3 5.7L21 8"/><path d="M21 3v5h-5"/></svg>
          </button>
          <button class="icon-button" id="addBtn" data-tip="添加">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
        </div>
      </header>

      <label class="search">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="7"/></svg>
        </span>
        <input id="watchSearch" placeholder="搜索自选股" autocomplete="off">
      </label>

      <div class="watchlist" id="watchlist" aria-label="自选股列表"></div>
    </aside>

    <main class="content">
      <section class="workspace" id="workspace">
        <div class="hero-strip">
          <div class="hero-price">
            <div class="title-block">
              <div class="eyebrow" id="stockCode">600519 · 上证</div>
              <h2 id="stockName">贵州茅台</h2>
            </div>
            <div>
              <div class="price up" id="heroPrice">1290.20</div>
              <div class="change-line">
                <span id="heroChange" class="up">+12.84</span>
                <span id="heroPct" class="up">+1.00%</span>
                <span id="heroTime">14:47:23</span>
              </div>
            </div>
          </div>

          <div class="segmented" aria-label="图表周期">
            <button class="active" data-chart="minute">分时</button>
            <button data-chart="daily">K 线</button>
          </div>

    function renderWatchlist() {
      const q = $("watchSearch").value.trim().toLowerCase();
      const box = $("watchlist");
      const rows = stocks
        .filter((item) => !q || item.code.includes(q) || item.name.toLowerCase().includes(q))

    function startSwipe(event) {
      const target = event.currentTarget;
      const startX = event.clientX;
      let moved = false;

      function onMove(moveEvent) {
        const dx = moveEvent.clientX - startX;
        if (Math.abs(dx) < 24) return;
        moved = true;
        target.style.transform = `translateX(${Math.max(-72, Math.min(72, dx))}px)`;
        target.style.background = dx > 0 ? "rgba(255,196,100,.08)" : "rgba(255,107,102,.08)";
      }

      function onUp(upEvent) {
        const dx = upEvent.clientX - startX;
        target.style.transform = "";
        target.style.background = "";
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        if (!moved) return;
        const stock = stocks.find((item) => item.code === target.dataset.code);
        if (!stock) return;
        if (dx > 72) stock.pinned = !stock.pinned;
        if (dx < -72 && stocks.length > 1) {
          const index = stocks.findIndex((item) => item.code === stock.code);
          stocks.splice(index, 1);
          selectedCode = stocks[0].code;
        }
        render();
      }

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    }

    function series(base, count, range) {
      return Array.from({ length: count }, (_, index) => {
        const wave = Math.sin(index / 4) * range * .42;
        const drift = (Math.random() - .48) * range;
        return +(base + wave + drift).toFixed(2);
      });
    }

    function drawChart() {
      const stock = selectedStock();
      const canvas = $("chart");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      const pad = { left: 52, right: 24, top: 24, bottom: 44 };
      ctx.clearRect(0, 0, width, height);

      if (chartMode === "daily") {
        drawCandles(ctx, stock, width, height, pad);
        $("chartTitle").textContent = "K 线";
        return;
      }

      const points = series(stock.price, 56, stock.price * .016);
      const average = points.map((_, i) => {
        const start = Math.max(0, i - 6);
        const slice = points.slice(start, i + 1);
        return slice.reduce((sum, value) => sum + value, 0) / slice.length;
      });
      const min = Math.min(...points, ...average);
      const max = Math.max(...points, ...average);

      drawGrid(ctx, width, height, pad);
      drawVolumes(ctx, points, width, height, pad);
      drawLine(ctx, average, min, max, width, height, pad, "rgba(255,196,100,.62)", 1.5);
      drawLine(ctx, points, min, max, width, height, pad, "#68a7ff", 2.4);
      drawAxisLabels(ctx, min, max, width, height, pad, ["09:30", "11:30", "13:00", "15:00"]);

    function drawGrid(ctx, width, height, pad) {
      ctx.strokeStyle = "#24282d";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + i * ((height - pad.top - pad.bottom) / 4);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
      }
    }

    function drawVolumes(ctx, points, width, height, pad) {
      const maxVolume = Math.max(...points.map(() => Math.random() * 100 + 20));
      points.forEach((_, index) => {
        const value = Math.random() * 100 + 20;
        const x = pad.left + index * ((width - pad.left - pad.right) / (points.length - 1));
        const h = value / maxVolume * 54;
        ctx.fillStyle = "rgba(104,167,255,.16)";
        ctx.fillRect(x - 2, height - pad.bottom - h, 4, h);
      });
    }

    function drawLine(ctx, data, min, max, width, height, pad, color, lineWidth) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      data.forEach((value, index) => {
        const x = pad.left + index * ((width - pad.left - pad.right) / (data.length - 1));
        const y = height - pad.bottom - ((value - min) / (max - min || 1)) * (height - pad.top - pad.bottom);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    function drawAxisLabels(ctx, min, max, width, height, pad, labels) {
      ctx.fillStyle = "#656d75";
      ctx.font = "12px Segoe UI, Microsoft YaHei";
      ctx.textBaseline = "middle";
      ctx.fillText(max.toFixed(2), 8, pad.top + 2);
      ctx.fillText(min.toFixed(2), 8, height - pad.bottom);
      ctx.textBaseline = "alphabetic";
      labels.forEach((label, index) => {
        const x = pad.left + index * ((width - pad.left - pad.right) / (labels.length - 1));
        ctx.fillText(label, x - 16, height - 16);
      });
    }

    function drawCandles(ctx, stock, width, height, pad) {
      const candles = series(stock.price, 36, stock.price * .04).map((close, index, arr) => {
        const open = index === 0 ? stock.open : arr[index - 1];
        const high = Math.max(open, close) + Math.random() * stock.price * .012;
        const low = Math.min(open, close) - Math.random() * stock.price * .012;
        return { open, close, high, low };
      });
      const values = candles.flatMap((item) => [item.high, item.low]);
      const min = Math.min(...values);
      const max = Math.max(...values);
      drawGrid(ctx, width, height, pad);

      const step = (width - pad.left - pad.right) / candles.length;
      candles.forEach((item, index) => {
        const x = pad.left + index * step + step / 2;
        const highY = height - pad.bottom - ((item.high - min) / (max - min)) * (height - pad.top - pad.bottom);
        const lowY = height - pad.bottom - ((item.low - min) / (max - min)) * (height - pad.top - pad.bottom);
        const openY = height - pad.bottom - ((item.open - min) / (max - min)) * (height - pad.top - pad.bottom);
        const closeY = height - pad.bottom - ((item.close - min) / (max - min)) * (height - pad.top - pad.bottom);
        const color = item.close >= item.open ? "#ff6b66" : "#35c58a";
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, highY);
        ctx.lineTo(x, lowY);
        ctx.stroke();
        ctx.fillRect(x - step * .27, Math.min(openY, closeY), step * .54, Math.max(2, Math.abs(openY - closeY)));
      });

      drawAxisLabels(ctx, min, max, width, height, pad, ["30日", "20日", "10日", "今日"]);
    }

      const q = $("globalSearch").value.trim().toLowerCase();
      const results = q ? stocks.filter((stock) => stock.code.includes(q) || stock.name.toLowerCase().includes(q)) : [];
      $("resultList").innerHTML = q && results.length
        ? results.map((stock) => `
          <div class="result">
            <div>
              <strong>${stock.name}</strong>
              <div class="stock-code">${stock.code} · ${stock.market}</div>
            </div>
            <button data-add="${stock.code}">关注</button>
          </div>
        `).join("")
        : `<div class="empty">${q ? "没有找到匹配股票" : "搜索后显示结果"}</div>`;

      document.querySelectorAll("[data-add]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedCode = button.dataset.add;
          activeView = "watch";
          render();
        });
      });
    }

    function tick() {
      stocks.forEach((stock) => {
        const delta = (Math.random() - .49) * stock.price * .0028;
        stock.price = Math.max(.01, stock.price + delta);
        stock.high = Math.max(stock.high, stock.price);
        stock.low = Math.min(stock.low, stock.price);
        stock.buy = Math.max(.01, stock.price - Math.random() * .04);
        stock.sell = stock.price + Math.random() * .04;
      });
      const price = $("heroPrice");
      price.classList.remove("pulse");
      void price.offsetWidth;
      price.classList.add("pulse");
      $("marketState").textContent = `A 股 · 已刷新 ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
      render();
    }

    function render() {
      document.body.classList.toggle("minimal", minimal);
      $("workspace").classList.toggle("discovery-mode", activeView === "discover");
      $("watchTab").classList.toggle("active", activeView === "watch");
      $("discoverTab").classList.toggle("active", activeView === "discover");
      document.querySelectorAll("[data-chart]").forEach((button) => {
        button.classList.toggle("active", button.dataset.chart === chartMode);
      });

      renderWatchlist();
      renderHero();
      renderMetrics();
      renderOrderbook();
      renderFinance();
      renderNews();
      renderDiscovery();
      drawChart();
    }

    $("watchSearch").addEventListener("input", renderWatchlist);
    $("globalSearch").addEventListener("input", renderDiscovery);
    $("watchTab").addEventListener("click", () => { activeView = "watch"; render(); });
    $("discoverTab").addEventListener("click", () => { activeView = "discover"; render(); });
    $("minimalToggle").addEventListener("click", () => { minimal = !minimal; render(); });
    $("refreshBtn").addEventListener("click", tick);
    $("addBtn").addEventListener("click", () => {
      activeView = "discover";
      render();
      $("globalSearch").focus();
    });
    document.querySelectorAll("[data-chart]").forEach((button) => {
      button.addEventListener("click", () => {
        chartMode = button.dataset.chart;
        render();
      });
    });
    document.querySelectorAll("[data-report]").forEach((button) => {
      button.addEventListener("click", () => {
        financeReport = button.dataset.report;
        renderFinance();
      });
    });

    render();
    setInterval(tick, 8000);
  </script>
</body>
</html>
